<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Gateway</title>
<script src="/static/i18n.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap');

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2234;
    --border: #253049;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.15);
    --danger: #f43f5e;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans SC', system-ui, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridShift 20s linear infinite;
  }
  @keyframes gridShift {
    0% { transform: translate(0,0); }
    100% { transform: translate(60px,60px); }
  }

  .login-card {
    position: relative;
    width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 36px 36px;
    animation: cardIn 0.5s ease-out;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(20px) scale(0.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: -1px; left: 40px; right: 40px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px; height: 56px;
    background: var(--accent-glow);
    border: 1px solid rgba(56,189,248,0.2);
    border-radius: 14px;
    margin-bottom: 16px;
    font-size: 24px;
  }
  .logo h1 {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .logo p {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 4px;
  }

  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input {
    width: 100%;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 15px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .error-msg {
    display: none;
    padding: 10px 14px;
    background: rgba(244,63,94,0.1);
    border: 1px solid rgba(244,63,94,0.2);
    border-radius: 8px;
    color: var(--danger);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .error-msg.show { display: block; }

  .btn {
    width: 100%;
    padding: 13px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: var(--accent);
    color: #0a0e17;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">📡</div>
      <h1>SMS Gateway</h1>
      <p data-i18n-login="subtitle"></p>
    </div>

    <div id="error" class="error-msg"></div>

    <div class="field">
      <label data-i18n-login="passwordLabel"></label>
      <input type="password" id="password" autocomplete="current-password" autofocus data-i18n-login-placeholder="passwordPlaceholder">
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()" data-i18n-login="loginBtn"></button>
  </div>

<script>
function detectLocale() {
  const saved = localStorage.getItem('lang');
  if (saved && LOCALES[saved]) return LOCALES[saved];
  const langs = navigator.languages?.length ? navigator.languages : [navigator.language || 'en'];
  for (const lang of langs) {
    if (LOCALES[lang]) return LOCALES[lang];
    const parts = lang.split('-');
    for (let i = parts.length - 1; i > 0; i--) {
      const tag = parts.slice(0, i).join('-');
      if (LOCALES[tag]) return LOCALES[tag];
    }
    const prefix = parts[0];
    const key = Object.keys(LOCALES).find(k => k.split('-')[0] === prefix);
    if (key) return LOCALES[key];
  }
  return LOCALES['en'];
}
const _locale = detectLocale();
const L = _locale.LOGIN;
function tErr(code) { return _locale.ERR[code] || code; }

// Apply login page strings
document.title = L.pageTitle;
document.querySelectorAll('[data-i18n-login]').forEach(el => {
  const v = L[el.dataset.i18nLogin];
  if (v !== undefined) el.textContent = v;
});
document.querySelectorAll('[data-i18n-login-placeholder]').forEach(el => {
  const v = L[el.dataset.i18nLoginPlaceholder];
  if (v !== undefined) el.placeholder = v;
});

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('error');
  const pwd = document.getElementById('password').value;
  if (!pwd) { errEl.textContent = L.errEmpty; errEl.classList.add('show'); return; }

  btn.disabled = true;
  btn.textContent = L.loginBtnLoading;
  errEl.classList.remove('show');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pwd}),
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      errEl.textContent = tErr(data.error || 'wrong_password');
      errEl.classList.add('show');
    }
  } catch(e) {
    errEl.textContent = L.errNetwork;
    errEl.classList.add('show');
  }
  btn.disabled = false;
  btn.textContent = L.loginBtn;
}
</script>
</body>
</html>
