services:
  sms-gateway:
    build: .
    container_name: sms-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
      - /dev:/dev:ro
    device_cgroup_rules:
      - 'c 188:* rmw'
    environment:
      - TTY_SMS=${TTY_SMS:-/dev/ttyUSB1}
      - TTY_AT=${TTY_AT:-}
      - POLL_INTERVAL=${POLL_INTERVAL:-3}
      - PASSWORD=${PASSWORD:-admin}
      - SECRET_KEY=${SECRET_KEY:-}
      - MODEM_PHONE=${MODEM_PHONE:-}
